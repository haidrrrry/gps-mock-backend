<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <ion-icon name="earth"></ion-icon> Admin
            </div>
            <a href="dashboard.html" class="nav-item active"><ion-icon name="grid-outline"></ion-icon> Dashboard</a>
            <a href="users.html" class="nav-item"><ion-icon name="people-outline"></ion-icon> Users</a>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn-icon"><ion-icon name="moon-outline"></ion-icon></button>
                <button id="logout-btn" class="btn-icon"><ion-icon name="log-out-outline" style="color:var(--danger)"></ion-icon></button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="page-header">
                <h1>Dashboard</h1>
            </header>
            
            <div class="stats-grid" style="margin-bottom: 30px;">
                <div class="card stat-card" style="border-left: 4px solid var(--primary);">
                    <h3>Total Users</h3><h2 id="s-total">...</h2>
                </div>
                <div class="card stat-card" style="border-left: 4px solid var(--success);">
                    <h3>Active Users</h3><h2 id="s-active">...</h2>
                </div>
                <div class="card stat-card" style="border-left: 4px solid var(--danger);">
                    <h3>Banned Users</h3><h2 id="s-banned">...</h2>
                </div>
                <div class="card stat-card" style="border-left: 4px solid var(--warning);">
                    <h3>Expiring < 3 Days</h3><h2 id="s-expiring">...</h2>
                </div>
            </div>
            
            <div class="card">
                <h3>Recent Users</h3>
                <div class="table-responsive" style="margin-top: 20px;">
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody id="recent-users-tbody">
                            <tr><td colspan="3">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
